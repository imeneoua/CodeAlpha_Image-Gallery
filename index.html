<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Gallery</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="gallery">
      <!-- TOP NAV -->
      <nav class="top">
        <div class="nav-left">
          <button class="icon-btn">
            <i class="fa-regular fa-book-open"></i>
          </button>
          <button class="icon-btn"><i class="fa-regular fa-images"></i></button>
        </div>
        <div class="nav-right">
          <button class="icon-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
      </nav>

      <!-- TITLE -->
      <div id="title">
        <h1>Travel </h1>
        <p>
          Page <span id="current-page">1</span> of
          <span id="total-pages">7</span>
        </p>
      </div>

      <!-- BOOK -->
      <div class="book-wrapper">
        <!-- LEFT ARROW -->
        <button class="prev-btn" >
          <i class="fa-regular fa-angle-left"></i>
        </button>

        <div class="book" id="book">
          <!-- LEFT PAGE -->
          <div class="left-side">
            <div class="large">
              <img id="img1" src="Images/img1.jpg" alt="photo" />
            </div>
            <div class="photo-row">
              <div class="small"><img id="img2" src="Images/img2.jpg" alt="photo" /></div>
              <div class="small"><img id="img3" src="Images/img3.jpg" alt="photo" /></div>
            </div>
          </div>

          <!-- SPINE -->
          <div class="spine"></div>

          <!-- RIGHT PAGE -->
          <div class="right-side">
            <div class="photo-row">
              <div class="small"><img id="img4" src="Images/img4.jpg" alt="photo" /></div>
              <div class="small"><img id="img5" src="Images/img5.jpg" alt="photo" /></div>
            </div>
            <div class="large">
              <img id="img6" src="Images/img6.jpg" alt="photo" />
            </div>
          </div>
        </div>

        <!-- RIGHT ARROW -->
        <button class="next-btn">
          <i class="fa-regular fa-angle-right"></i>
        </button>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom">
      <button class="icon-btn"><i class="fa-regular fa-plus"></i></button>
      <button class="icon-btn"><i class="fa-regular fa-download"></i></button>
      <button class="icon-btn"><i class="fa-regular fa-trash-can"></i></button>
    </nav>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightboxClose">&times;</button>
      <img src="" alt="full view" id="lightboxImg" />
    </div>

    <script src="script.js"></script>
  </body>
</html>
